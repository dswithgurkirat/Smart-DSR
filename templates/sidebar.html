<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">
      <div class="sb-logo-mark">DSR</div>
      <div class="sb-logo-text"><h2>DSR Portal</h2><p>IIT Ropar · Punjab</p></div>
    </div>
  </div>
  <div class="sb-user">
    <div class="sb-avatar" id="sb-avatar">RK</div>
    <div><div class="sb-uname" id="sb-uname">User Name</div><div class="sb-urole" id="sb-urole">Report Coordinator</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">
      <div class="sb-section-lbl">Overview</div>
      <button class="sb-item active" onclick="showView('dashboard',this)"><span class="sb-ico">🏠</span>Dashboard<span class="sb-badge" id="badge-projs">3</span></button>
      <button class="sb-item" onclick="showView('projects',this)"><span class="sb-ico">📁</span>My Projects</button>
      <button class="sb-item" onclick="showView('workflow',this)"><span class="sb-ico">🔄</span>Report Workflow</button>
    </div>
    <div class="sb-section" id="report-nav" style="display:none">
      <div class="sb-section-lbl">DSR Sections</div>
      <button class="sb-item" onclick="showView('front-matter',this)"><span class="sb-ico">📋</span>Front Matter</button>
      <button class="sb-item" onclick="showView('chapters',this)"><span class="sb-ico">📖</span>Chapters (10)</button>
      <button class="sb-item" onclick="showView('plates',this)"><span class="sb-ico">🗺️</span>Plate Section</button>
      <button class="sb-item" onclick="showView('graphs',this)" style="padding-left: 24px; font-size: 11px;"><span class="sb-ico" style="width: 24px; height: 24px; font-size: 11px;">📈</span>Cross Section Graphs</button>
    </div>
    <div class="sb-section" id="annexure-nav" style="display:none">
      <div class="sb-section-lbl">Annexures</div>
      <button class="sb-item" onclick="showView('anx1',this)"><span class="sb-ico">Ⅰ</span>Annexure I — Sources</button>
      <button class="sb-item" onclick="showView('anx2',this)"><span class="sb-ico">Ⅱ</span>Annexure II — Leases</button>
      <button class="sb-item" onclick="showView('anx3',this)"><span class="sb-ico">Ⅲ</span>Annexure III — Clusters</button>
      <button class="sb-item" onclick="showView('anx4',this)"><span class="sb-ico">Ⅳ</span>Annexure IV — Transport</button>
      <button class="sb-item" onclick="showView('anx5',this)"><span class="sb-ico">Ⅴ</span>Annexure V — Bench Mark & CORS</button>
      <button class="sb-item" onclick="showView('anx6',this)"><span class="sb-ico">Ⅵ</span>Annexure VI — Final Cluster Details</button>
      <button class="sb-item" onclick="showView('anx7',this)"><span class="sb-ico">Ⅶ</span>Annexure VII — Final Patta Lands</button>
      <button class="sb-item" onclick="showView('annexures-extra',this)"><span class="sb-ico">+</span>More Annexures</button>
    </div>
    <div class="sb-section" id="tables-nav" style="display:none">
      <div class="sb-section-lbl">Data Tables</div>
      <button class="sb-item" onclick="showView('demand-table',this)"><span class="sb-ico">📊</span>Demand Table</button>
      <button class="sb-item" onclick="showView('auction-table',this)"><span class="sb-ico">🏛️</span>Auctioned Sites</button>
      <button class="sb-item" onclick="showView('summary-table',this)"><span class="sb-ico">📉</span>Source Summary</button>
      <button class="sb-item" onclick="showView('benchmark-table',this)"><span class="sb-ico">📍</span>Bench Mark & CORS</button>
    </div>
    <div class="sb-section" id="finalize-nav" style="display:none">
      <div class="sb-section-lbl">Finalize</div>
      <button class="sb-item" onclick="showView('esign',this)"><span class="sb-ico">✍️</span>E-Signatures<span class="sb-badge sb-badge-red" id="sb-pending-sigs">5</span></button>
      <button class="btn sb-item" onclick="showView('generate',this)"><span class="sb-ico">📥</span>Generate PDF</button>
      <button class="sb-item" onclick="showView('history',this)"><span class="sb-ico">🕑</span>Report History</button>
      <button class="sb-item" onclick="showView('users',this)"><span class="sb-ico">👥</span>User Management</button>
    </div>
  </nav>
  <div class="sb-bottom">
    <div class="sb-status-row"><span class="status-dot"></span><span class="status-txt">EMGSM 2020 Compliant</span></div>
    <button class="sb-logout" onclick="doLogout()">🚪 Logout</button>
  </div>
</aside>
